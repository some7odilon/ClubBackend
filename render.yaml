services:
  - type: web
    name: club-backend
    runtime: python
    repo: https://github.com/some7odilon/ClubBackend  # Votre repo backend
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn Backend.wsgi:application --bind 0.0.0.0:8000"
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: DATABASE_URL
        fromDatabase:
          name: club-db
          property: connectionString
      - key: RENDER
        value: true

databases:
  - name: club-db
    plan: free